services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: ${DB_NAME:-talkwithdoc_db}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      SEED_DEMO_USERS: ${SEED_DEMO_USERS:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://talkwithdoc.jingjiqingcheng.com}
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "8001"

  frontend:
    build:
      context: ./frontend
      args:
        EXPO_PUBLIC_BACKEND_URL: ""
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mongo_data:
